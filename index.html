<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Under Construction</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root{
      --gold:#D4A017;
      --green:#1B5E35;
      --ink:#0B0D0B;
      --warm:#F4EFE6;
    }

    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:
        linear-gradient(180deg, rgba(11,13,11,.96), rgba(11,13,11,.98)),
        #0B0D0B;
      color:var(--warm);
      font-family: Arial, sans-serif;
      overflow:hidden;
    }

    .page{
      width:min(900px, 92%);
      text-align:center;
      padding:2rem;
    }

    .logo{
      width:min(260px, 70vw);
      height:auto;
      margin:0 auto 2rem;
      display:block;
    }

    h1{
      font-size:clamp(2rem, 6vw, 4.5rem);
      font-weight:900;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:var(--gold);
    }
  </style>
</head>
<body>
  <main class="page">
    <img
      src="/images/jackie-reyes-yanes-logo-yellow-green.png"
      alt="Jackie Reyes-Yanes logo"
      class="logo"
    />
    <h1>Under Construction</h1>
  </main>
</body>
</html>
