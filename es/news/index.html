  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    :root{
      --gold:#D4A017;
      --gold-lt:#F0C040;
      --green:#1B5E35;
      --green-lt:#2E7D45;
      --ink:#0B0D0B;
      --warm:#F4EFE6;
      --warm2:#E8E2D6;
      --cream:#F9F6EF;
      --muted:rgba(244,239,230,.52);
      --red:#C0392B;
    }

    html{scroll-behavior:smooth}

    body{
      margin:0;
      font-family:'Barlow',sans-serif;
      background:var(--ink);
      color:var(--warm);
      overflow-x:hidden;
    }

    a{color:inherit;text-decoration:none}

    /* NAV */
    #nav{
      position:fixed;
      top:0;
      left:0;
      right:0;
      z-index:300;
      padding:0 2rem;
      height:95px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      background:rgba(11,13,11,.96);
      transition:background .4s,border-color .4s;
      border-bottom:1px solid rgba(212,160,23,.2);
    }

    #nav.solid{
      background:rgba(11,13,11,.96);
      border-color:rgba(212,160,23,.2);
    }

    .nav-logo{
      display:flex;
      align-items:center;
      gap:.7rem;
    }

    .nav-logo img{
      height:78px;
      width:auto;
      object-fit:contain;
      display:block;
    }

    .nav-wordmark{
      font-family:'League Spartan',sans-serif;
      font-weight:800;
      font-size:1.1rem;
      letter-spacing:.04em;
      text-transform:uppercase;
      line-height:1;
      color:var(--warm);
    }

    .nav-wordmark span{
      color:var(--gold);
      display:block;
      font-size:.7rem;
      letter-spacing:.18em;
      font-weight:600;
      margin-top:.15rem;
    }

    .nav-right{
      display:flex;
      align-items:center;
      gap:1.1rem;
    }

    .nav-links{
      display:flex;
      gap:1rem;
      list-style:none;
      margin:0;
      padding:0;
    }

    .nav-links li{
      list-style:none;
    }

    .nav-links a{
      font-family:'League Spartan',sans-serif;
      font-size:.88rem;
      font-weight:600;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:rgba(244,239,230,.65);
      transition:color .2s;
      white-space:nowrap;
    }

    .nav-links a:hover,
    .nav-links a.active{
      color:var(--gold);
    }

    .nav-donate{
      font-family:'League Spartan',sans-serif;
      font-size:.88rem;
      font-weight:700;
      letter-spacing:.08em;
      text-transform:uppercase;
      background:var(--gold);
      color:var(--ink);
      padding:.42rem .95rem;
      border:none;
      cursor:pointer;
      transition:background .2s;
      white-space:nowrap;
    }

    .nav-donate:hover{
      background:var(--gold-lt);
    }

    .ham{
      display:none;
      flex-direction:column;
      gap:5px;
      background:none;
      border:none;
      cursor:pointer;
      padding:4px;
    }

    .ham span{
      display:block;
      width:24px;
      height:2px;
      background:var(--warm);
      transition:all .3s;
      transform-origin:center;
    }

    .ham.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
    .ham.open span:nth-child(2){opacity:0}
    .ham.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}

    .mobile-nav{
      display:none;
      position:fixed;
      inset:0;
      top:70px;
      z-index:299;
      background:rgba(11,13,11,.97);
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:2.5rem;
    }

    .mobile-nav.open{
      display:flex;
    }

    .mobile-nav a{
      font-family:'Barlow Condensed',sans-serif;
      font-size:2.2rem;
      font-weight:800;
      letter-spacing:.06em;
      text-transform:uppercase;
      color:var(--warm);
      transition:color .2s;
    }

    .mobile-nav a:hover{
      color:var(--gold);
    }

    .mobile-nav .m-cta{
      background:var(--gold);
      color:var(--ink);
      padding:.6rem 2.5rem;
      font-size:1.6rem;
    }

    /* PAGE */
    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:9rem 1.5rem 4rem;
    }

    .section-label{
      font-family:'League Spartan',sans-serif;
      color:var(--gold);
      text-transform:uppercase;
      letter-spacing:.12em;
      font-size:.8rem;
      margin-bottom:1rem;
    }

    h1{
      font-family:'League Spartan',sans-serif;
      font-size:clamp(2.4rem,5vw,4rem);
      margin:0 0 2rem 0;
      color:var(--warm);
      text-transform:uppercase;
      line-height:.95;
    }

    .news-grid{
      display:grid;
      gap:1.5rem;
    }

    .news-card{
      display:grid;
      grid-template-columns:260px 1fr;
      gap:1.2rem;
      background:rgba(244,239,230,.04);
      border:1px solid rgba(244,239,230,.08);
      overflow:hidden;
    }

    .news-card-image-wrap{
      width:100%;
      min-height:220px;
      background:#111;
      overflow:hidden;
    }

    .news-card-image{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .news-card-body{
      padding:1.2rem 1.2rem 1.2rem 0;
      background:rgba(11,13,11,.92);
    }

    .news-source-date{
      color:var(--gold);
      font-family:'League Spartan',sans-serif;
      text-transform:uppercase;
      letter-spacing:.06em;
      font-size:.8rem;
      margin-bottom:.8rem;
    }

    .news-card h2{
      font-family:'League Spartan',sans-serif;
      margin:0 0 .7rem 0;
      font-size:1.5rem;
      color:var(--warm);
    }

    .news-card p{
      margin:0 0 1rem 0;
      line-height:1.6;
      color:rgba(244,239,230,.78);
      font-family:'Lora',serif;
    }

    .news-link{
      display:inline-block;
      background:var(--gold);
      color:var(--ink);
      font-family:'League Spartan',sans-serif;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.06em;
      padding:.75rem 1rem;
    }

    .news-link:hover{
      background:var(--gold-lt);
    }

    /* lang switch */
    .lang-switch{
      display:flex;
      align-items:center;
      gap:.35rem;
      font-family:'League Spartan',sans-serif;
      font-size:.8rem;
      letter-spacing:.08em;
      text-transform:uppercase;
      white-space:nowrap;
    }

    .lang-switch a{
      color:rgba(244,239,230,.6);
      text-decoration:none;
      transition:color .2s;
    }

    .lang-switch a:hover{
      color:var(--gold);
    }

    .lang-switch .active{
      color:var(--gold);
      font-weight:700;
    }

    .lang-switch .divider{
      color:rgba(244,239,230,.3);
    }

    @media(max-width:900px){
      .nav-links{display:none}
      .nav-donate{display:none}
      .ham{display:flex}
      .lang-switch{display:none}

      #nav{
        height:78px;
        padding:0 1rem;
      }

      .mobile-nav{
        top:78px;
        padding:1.5rem 1.25rem 2rem;
        justify-content:flex-start;
        overflow-y:auto;
      }

      .nav-logo img{ height:56px; }

      .news-card{
        grid-template-columns:1fr;
      }

      .news-card-image-wrap{
        min-height:220px;
        aspect-ratio:16 / 9;
      }

      .news-card-body{
        padding:1rem;
      }

      .wrap{
        padding:7rem 1rem 3rem;
      }
    }

    @media (max-width: 600px){
      #nav{ padding:0 .8rem; }
      .nav-logo img{ height:50px; }

      .wrap{
        padding:6.5rem .9rem 2.5rem;
      }

      h1{
        font-size:2rem;
        line-height:1;
      }

      .section-label{
        font-size:.72rem;
      }

      .news-grid{
        gap:1rem;
      }

      .news-card h2{
        font-size:1.1rem;
        line-height:1.18;
      }

      .news-card p{
        font-size:.95rem;
        line-height:1.55;
      }

      .news-source-date{
        font-size:.72rem;
        line-height:1.4;
      }

      .news-card-image-wrap{
        min-height:180px;
        aspect-ratio:16 / 9;
      }

      .news-link{
        width:100%;
        text-align:center;
      }
    }

  </style>
</head>
<body>

  <nav id="nav">

  <main class="wrap">
    <div class="section-label">Prensa</div>
    <h1>Toda la Cobertura de Prensa</h1>
    <div id="all-news-list" class="news-grid"></div>
  </main>

  <script>
    function escapeHtml(str = '') {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function getYouTubeId(url = '') {
      if (!url) return '';
      try {
        const parsed = new URL(url, window.location.origin);
        const host = parsed.hostname.replace('www.', '');
        if (host === 'youtu.be') return parsed.pathname.split('/').filter(Boolean)[0] || '';
        if (host.includes('youtube.com')) {
          if (parsed.searchParams.get('v')) return parsed.searchParams.get('v');
          const parts = parsed.pathname.split('/').filter(Boolean);
          const shortsIndex = parts.indexOf('shorts');
          if (shortsIndex !== -1 && parts[shortsIndex + 1]) return parts[shortsIndex + 1];
          const embedIndex = parts.indexOf('embed');
          if (embedIndex !== -1 && parts[embedIndex + 1]) return parts[embedIndex + 1];
        }
      } catch (e) {
        const match = url.match(/(?:youtube\.com\/(?:watch\?v=|shorts\/|embed\/|live\/)|youtu\.be\/)([^?&#/]+)/i);
        return match ? match[1] : '';
      }
      return '';
    }

    function youtubeThumbnail(url = '') {
      const id = getYouTubeId(url);
      return id ? `https://img.youtube.com/vi/${id}/hqdefault.jpg` : '';
    }

    function isUploadedImage(url = "") {
      return typeof url === "string" && url.startsWith("/images/");
    }

    function mediaImage(item) {
      if (isUploadedImage(item.image)) return item.image;
      if (isUploadedImage(item.card_image)) return item.card_image;

      if (item.card_image) return item.card_image;
      if (item.image && !item.image.startsWith("http")) return item.image;

      return youtubeThumbnail(item.video_url || "") || "";
    }

    async function loadAllNews() {
      const container = document.getElementById("all-news-list");
      if (!container) return;

      try {
        const response = await fetch("/data/news.json", { cache: "no-store" });
        const data = await response.json();
        const items = Array.isArray(data.items) ? data.items : [];

        container.innerHTML = items.map(item => {
          const title = item.title_es || item.title_en || item.title || '';
          const summary = item.summary_es || item.summary_en || item.summary || '';
          const image = mediaImage(item);
          const isVideo = item.type === "video";
          return `
            <article class="news-card">
              <div class="news-card-image-wrap">
                ${image
                  ? `<img src="${escapeHtml(image)}" alt="${escapeHtml(title)}" class="news-card-image">`
                  : `<div class="news-card-image"></div>`}
              </div>
              <div class="news-card-body">
                <div class="news-source-date">
                  ${escapeHtml(item.source || "")}${item.date ? " • " + escapeHtml(item.date) : ""}${item.language ? " • " + escapeHtml(item.language) : ""}
                </div>
                <h2>${escapeHtml(title)}</h2>
                ${summary ? `<p>${escapeHtml(summary)}</p>` : ""}
                <a class="news-link" href="${escapeHtml(item.url || item.video_url || "#")}" target="_blank" rel="noopener noreferrer">${isVideo ? "Ver Nota" : "Leer Cobertura"}</a>
              </div>
            </article>
          `;
        }).join("");
      } catch (error) {
        console.error("Error al cargar noticias:", error);
        container.innerHTML = "<p>No se pudo cargar la cobertura de prensa en este momento.</p>";
      }
    }

    loadAllNews();
  </script>

  <script>
    const nav = document.getElementById('nav');

    window.addEventListener('scroll', () => {
      if (nav) nav.classList.toggle('solid', window.scrollY > 50);
    });

    function toggleMenu() {
      const h = document.getElementById('ham');
      const m = document.getElementById('mnav');
      if (h && m) {
        h.classList.toggle('open');
        m.classList.toggle('open');
      }
    }
  </script>

</body>
