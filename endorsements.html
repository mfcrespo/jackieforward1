  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    :root{
      --gold:#D4A017;
      --gold-lt:#F0C040;
      --green:#1B5E35;
      --green-lt:#2E7D45;
      --ink:#0B0D0B;
      --warm:#F4EFE6;
      --warm2:#E8E2D6;
      --cream:#F9F6EF;
      --muted:rgba(244,239,230,.52);
      --red:#C0392B;
    }

    html{scroll-behavior:smooth}

    body{
      margin:0;
      font-family:'Barlow',sans-serif;
      background:var(--ink);
      color:var(--warm);
      overflow-x:hidden;
    }

    a{color:inherit;text-decoration:none}

    /* ─── NAV ──────────────────────────────────── */
    #nav{
      position:fixed;top:0;left:0;right:0;z-index:300;
      padding:0 2rem;height:95px;
      display:flex;align-items:center;justify-content:space-between;
      background:rgba(11,13,11,.96);
      transition:background .4s,border-color .4s;
      border-bottom:1px solid rgba(212,160,23,.2);
    }

    #nav.solid{
      background:rgba(11,13,11,.96);
      border-color:rgba(212,160,23,.2);
    }

    .nav-logo{
      display:flex;align-items:center;gap:.7rem;
    }

    .nav-logo img{
      height:78px;width:auto;object-fit:contain;
    }

    .nav-wordmark{
      font-family:'League Spartan',sans-serif;
      font-weight:800;font-size:1.1rem;
      letter-spacing:.04em;text-transform:uppercase;
      line-height:1;
    }

    .nav-wordmark span{
      color:var(--gold);
      display:block;
      font-size:.7rem;
      letter-spacing:.18em;
      font-weight:600;
    }

    .nav-right{
      display:flex;align-items:center;gap:1.1rem;
    }

    .nav-links{
      display:flex;gap:1rem;list-style:none;
    }

    .nav-links a{
      font-family:'League Spartan',sans-serif;
      font-size:.88rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
      color:rgba(244,239,230,.65);transition:color .2s;
      white-space:nowrap;
    }

    .nav-links a:hover{
      color:var(--gold);
    }

    .nav-links a.active{
      color:var(--gold);
    }

    .nav-donate{
      font-family:'League Spartan',sans-serif;
      font-size:.88rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
      background:var(--gold);color:var(--ink);
      padding:.42rem .95rem;
      border:none;cursor:pointer;transition:background .2s;
      white-space:nowrap;
    }

    .nav-donate:hover{
      background:var(--gold-lt);
    }

    .ham{
      display:none;flex-direction:column;gap:5px;
      background:none;border:none;cursor:pointer;padding:4px;
    }

    .ham span{
      display:block;width:24px;height:2px;background:var(--warm);
      transition:all .3s;transform-origin:center;
    }

    .ham.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
    .ham.open span:nth-child(2){opacity:0}
    .ham.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}

    .mobile-nav{
      display:none;position:fixed;inset:0;top:70px;z-index:299;
      background:rgba(11,13,11,.97);
      flex-direction:column;align-items:center;justify-content:center;gap:2.5rem;
    }

    .mobile-nav.open{display:flex}

    .mobile-nav a{
      font-family:'Barlow Condensed',sans-serif;
      font-size:2.2rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;
      color:var(--warm);transition:color .2s;
    }

    .mobile-nav a:hover{color:var(--gold)}

    .mobile-nav .m-cta{
      background:var(--gold);color:var(--ink);
      padding:.6rem 2.5rem;font-size:1.6rem;
    }

    /* ─── PAGE ─────────────────────────────────── */
    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:9rem 1.5rem 4rem;
    }

    .section-label{
      font-family:'League Spartan', sans-serif;
      color:var(--gold);
      text-transform:uppercase;
      letter-spacing:.12em;
      font-size:.8rem;
      margin-bottom:1rem;
    }

    h1{
      font-family:'League Spartan', sans-serif;
      font-size:clamp(2.4rem, 5vw, 4rem);
      margin:0 0 2rem 0;
      color:var(--warm);
      text-transform:uppercase;
      line-height:.95;
    }

    .endorse-grid{
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:1.5rem;
      margin-top:2rem;
    }

    .endorse-card{
      background:rgba(244,239,230,.04);
      border:1px solid rgba(244,239,230,.08);
      overflow:hidden;
      min-height:100%;
      display:flex;
      flex-direction:column;
    }

    .endorse-media{
      aspect-ratio:16 / 9;
      background:#111;
      overflow:hidden;
    }

    .endorse-media img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .endorse-video iframe{
      width:100%;
      height:100%;
      border:0;
    }

    .endorse-placeholder{
      display:flex;
      align-items:center;
      justify-content:center;
      color:rgba(244,239,230,.45);
      font-family:'League Spartan', sans-serif;
      text-transform:uppercase;
      letter-spacing:.08em;
    }

    .endorse-body{
      padding:1.1rem;
      display:flex;
      flex-direction:column;
      gap:.85rem;
      height:100%;
    }

    .endorse-meta{
      display:flex;
      flex-wrap:wrap;
      gap:.5rem;
      align-items:center;
    }

    .endorse-pill{
      display:inline-block;
      padding:.35rem .55rem;
      font-family:'League Spartan', sans-serif;
      font-size:.72rem;
      text-transform:uppercase;
      letter-spacing:.06em;
      border:1px solid rgba(244,239,230,.14);
    }

    .endorse-source{
      color:var(--gold);
      border-color:rgba(212,160,23,.35);
    }

    .endorse-date{
      color:rgba(244,239,230,.8);
      border-color:rgba(244,239,230,.14);
    }

    .endorse-language{
      color:var(--warm);
      background:rgba(212,160,23,.10);
      border-color:rgba(212,160,23,.25);
      font-style:italic;
    }

    .endorse-card h3{
      margin:0;
      font-family:'League Spartan', sans-serif;
      font-size:1.35rem;
      line-height:1.1;
      color:var(--warm);
    }

    .endorser-name{
      font-family:'League Spartan', sans-serif;
      color:var(--gold);
      text-transform:uppercase;
      letter-spacing:.06em;
      font-size:.85rem;
    }

    .endorse-card p{
      margin:0;
      line-height:1.6;
      color:rgba(244,239,230,.75);
      font-family:'Lora', serif;
    }

    .endorse-link{
      margin-top:auto;
      font-family:'League Spartan', sans-serif;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.06em;
      color:var(--gold);
      text-decoration:none;
    }

    .endorse-link:hover{
      color:var(--gold-lt);
    }

    @media (max-width:1100px){
      .endorse-grid{
        grid-template-columns:repeat(2, 1fr);
      }
    }

    @media(max-width:900px){
      .nav-links{display:none}
      .nav-donate{display:none}
      .ham{display:flex}

      .endorse-grid{
        grid-template-columns:1fr;
      }
    }
  </style>

<body>

  <!-- ENDORSEMENTS -->

    <div class="section-label">Endorsements</div>
    <h1>All Endorsements</h1>
    <div id="all-endorsements-list" class="endorse-grid"></div>
  </main>

  <script>
    function escapeHtml(str = '') {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function normalizeFeatured(value) {
      return value === true || value === 'true' || value === 'True' || value === 1 || value === '1';
    }
    function getYouTubeId(url = '') {
      if (!url) return '';

      try {
        const parsed = new URL(url, window.location.origin);
        const host = parsed.hostname.replace('www.', '');

        if (host === 'youtu.be') {
          return parsed.pathname.split('/').filter(Boolean)[0] || '';
        }

        if (host.includes('youtube.com')) {
          if (parsed.searchParams.get('v')) return parsed.searchParams.get('v');

          const parts = parsed.pathname.split('/').filter(Boolean);
          const shortsIndex = parts.indexOf('shorts');
          if (shortsIndex !== -1 && parts[shortsIndex + 1]) return parts[shortsIndex + 1];

          const embedIndex = parts.indexOf('embed');
          if (embedIndex !== -1 && parts[embedIndex + 1]) return parts[embedIndex + 1];

          const liveIndex = parts.indexOf('live');
          if (liveIndex !== -1 && parts[liveIndex + 1]) return parts[liveIndex + 1];
        }
      } catch (e) {
        const match = url.match(/(?:youtube\.com\/(?:watch\?v=|shorts\/|embed\/|live\/)|youtu\.be\/)([^?&#/]+)/i);
        return match ? match[1] : '';
      }

      return '';
    }

    function videoEmbedUrl(url = '') {
      if (!url) return '';
      const youtubeId = getYouTubeId(url);
      if (youtubeId) return `https://www.youtube.com/embed/${youtubeId}`;
      if (url.includes('vimeo.com/')) {
        const id = url.split('vimeo.com/')[1].split('?')[0];
        return `https://player.vimeo.com/video/${id}`;
      }
      return url;
    }

    function youtubeThumbnail(url = '') {
      const id = getYouTubeId(url);
      return id ? `https://img.youtube.com/vi/${id}/hqdefault.jpg` : '';
    }

    function mediaImage(item) {
      return youtubeThumbnail(item.video_url || item.url || '') || item.card_image || item.image || '';
    }

    async function loadAllEndorsements() {
      const container = document.getElementById("all-endorsements-list");
      if (!container) return;

      try {
        const response = await fetch("/data/endorsements.json", { cache: "no-store" });
        const data = await response.json();
        const items = Array.isArray(data.items) ? data.items : [];

        container.innerHTML = items.map(item => {
          const image = mediaImage(item);
          const title = item.title_en || item.title_es || item.title || '';
          const summary = item.summary_en || item.summary_es || item.summary || '';
          const target = item.url || item.video_url || '#';
          const media = image
            ? `<div class="endorse-media"><img src="${escapeHtml(image)}" alt="${escapeHtml(title)}"></div>`
            : `<div class="endorse-media endorse-placeholder">${item.type === "video" ? "Video" : "No Media"}</div>`;

          return `
            <article class="endorse-card">
              ${media}
              <div class="endorse-body">
                <div class="endorse-meta">
                  ${item.source ? `<span class="endorse-pill endorse-source">${escapeHtml(item.source)}</span>` : ""}
                  ${item.date ? `<span class="endorse-pill endorse-date">${escapeHtml(item.date)}</span>` : ""}
                  ${item.language ? `<span class="endorse-pill endorse-language">${escapeHtml(item.language)}</span>` : ""}
                </div>
                <h3>${escapeHtml(title)}</h3>
                ${item.endorser ? `<div class="endorser-name">${escapeHtml(item.endorser)}</div>` : ""}
                ${summary ? `<p>${escapeHtml(summary)}</p>` : ""}
                ${target !== '#' ? `<a href="${escapeHtml(target)}" target="_blank" rel="noopener noreferrer" class="endorse-link">${item.type === "video" ? "Watch Endorsement →" : "Learn More →"}</a>` : ""}
              </div>
            </article>
          `;
        }).join("");
      } catch (error) {
        console.error("Error loading endorsements:", error);
        container.innerHTML = "<p>Unable to load endorsements right now.</p>";
      }
    }

    loadAllEndorsements();
  </script>

  <script>
    const nav = document.getElementById('nav');
    window.addEventListener('scroll', () => {
      if (nav) nav.classList.toggle('solid', window.scrollY > 50);
    });

    function toggleMenu() {
      const h = document.getElementById('ham');
      const m = document.getElementById('mnav');
      if (h && m) {
        h.classList.toggle('open');
        m.classList.toggle('open');
      }

/* lang switch button style */
    .lang-switch{

    }

    .lang-switch .divider{

    }


  </script>
