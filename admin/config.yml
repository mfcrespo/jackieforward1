backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

publish_mode: simple

collections:
#events
  - name: "events"
    label: "Events"
    label_singular: "Event"
    folder: "content/events"
    create: true
    slug: "{{slug}}"
    format: "json"
    extension: "json"
    summary: "{{title}} — {{date}} — {{category}}"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
        hint: "Example: Let’s Talk, Ward 1 – Meet & Greet"

      - label: "Event Date"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false

      - label: "Event Time"
        name: "time"
        widget: "string"
        hint: "Example: 3:00 PM – 4:00 PM"

      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "Meet & Greet", value: "meet-greet" }
          - { label: "Clean Up", value: "cleanup" }
          - { label: "Canvassing", value: "canvassing" }
          - { label: "Town Hall", value: "townhall" }
          - { label: "Fundraiser", value: "fundraiser" }
          - { label: "Community Event", value: "community" }

      - label: "Address"
        name: "address"
        widget: "string"
        hint: "Full public address"

      - label: "Description"
        name: "description"
        widget: "text"
        hint: "Short website description"

      - label: "RSVP Link"
        name: "rsvp"
        widget: "string"
        required: false
        hint: "Use full URL starting with https://"

      - label: "Event Image"
        name: "image"
        widget: "image"
        required: false

      - label: "Featured Event"
        name: "featured"
        widget: "boolean"
        default: false
        required: false

# news
  - name: "news"
    label: "News"
    label_singular: "News Item"
    folder: "content/news"
    create: true
    slug: "{{slug}}"
    format: "json"
    extension: "json"
    summary: "{{title}} — {{date}} — {{source}}"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"

      - label: "Date"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false

      - label: "Source"
        name: "source"
        widget: "string"
        hint: "Example: Telemundo, Washington Post, WUSA9"

      - label: "Language"
        name: "language"
        widget: "select"
        options:
          - { label: "English", value: "English" }
          - { label: "Spanish", value: "Spanish" }
          - { label: "Bilingual", value: "Bilingual" }        

      - label: "Article URL"
        name: "url"
        widget: "string"
        hint: "Full URL starting with https://"

      - label: "Summary"
        name: "summary"
        widget: "text"
        required: false

      - label: "Image"
        name: "image"
        widget: "image"
        required: false

      - label: "Featured on Home"
        name: "featured"
        widget: "boolean"
        default: false
        required: false

# endorsements
  - name: "endorsements"
    label: "Endorsements"
    label_singular: "Endorsement"
    folder: "content/endorsements"
    create: true
    slug: "{{slug}}"
    format: "json"
    extension: "json"
    summary: "{{title}} — {{date}} — {{type}}"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"

      - label: "Date"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false

      - label: "Endorser Name"
        name: "endorser"
        widget: "string"

      - label: "Type"
        name: "type"
        widget: "select"
        options:
          - { label: "Image", value: "image" }
          - { label: "Video", value: "video" }

      - label: "Image"
        name: "image"
        widget: "image"
        required: false

      - label: "Video URL"
        name: "video_url"
        widget: "string"
        required: false
        hint: "YouTube, Vimeo, or direct video link"

      - label: "Source / Organization"
        name: "source"
        widget: "string"
        required: false

      - label: "Language"
        name: "language"
        widget: "select"
        required: false
        options:
          - { label: "English", value: "English" }
          - { label: "Spanish", value: "Spanish" }
          - { label: "Bilingual", value: "Bilingual" }

      - label: "Quote / Summary"
        name: "summary"
        widget: "text"
        required: false

      - label: "External Link"
        name: "url"
        widget: "string"
        required: false
        hint: "Optional article or endorsement link"

      - label: "Featured on Home"
        name: "featured"
        widget: "boolean"
        default: false
        required: false        
