backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

publish_mode: simple

collections:
#events
  - name: "events"
    label: "Events"
    label_singular: "Event"
    folder: "content/events"
    create: true
    slug: "{{slug}}"
    format: "json"
    extension: "json"
    summary: "{{title_en}} / {{title_es}} — {{date}}"
    fields:
      - label: "Title (English)"
        name: "title_en"
        widget: "string"

      - label: "Title (Spanish)"
        name: "title_es"
        widget: "string"

      - label: "Event Date"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false

      - label: "Event Time"
        name: "time"
        widget: "string"

      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "Meet & Greet", value: "meet-greet" }
          - { label: "Clean Up", value: "cleanup" }
          - { label: "Canvassing", value: "canvassing" }
          - { label: "Town Hall", value: "townhall" }
          - { label: "Fundraiser", value: "fundraiser" }
          - { label: "Community Event", value: "community" }

      - label: "Address (English)"
        name: "address_en"
        widget: "string"

      - label: "Address (Spanish)"
        name: "address_es"
        widget: "string"
        required: false

      - label: "Description (English)"
        name: "description_en"
        widget: "text"
        required: false

      - label: "Description (Spanish)"
        name: "description_es"
        widget: "text"
        required: false

      - label: "RSVP Link"
        name: "rsvp"
        widget: "string"
        required: false

      - label: "Event Image"
        name: "image"
        widget: "image"
        required: false

      - label: "Featured Event"
        name: "featured"
        widget: "boolean"
        default: false
        required: false

# news
  - name: "news"
    label: "News"
    label_singular: "News Item"
    folder: "content/news"
    create: true
    slug: "{{slug}}"
    format: "json"
    extension: "json"
    summary: "{{title_en}} / {{title_es}} — {{date}}"
    fields:
      - label: "Title (English)"
        name: "title_en"
        widget: "string"

      - label: "Title (Spanish)"
        name: "title_es"
        widget: "string"

      - label: "Date"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false

      - label: "Source"
        name: "source"
        widget: "string"

      - label: "Article URL"
        name: "url"
        widget: "string"

      - label: "Summary (English)"
        name: "summary_en"
        widget: "text"
        required: false

      - label: "Summary (Spanish)"
        name: "summary_es"
        widget: "text"
        required: false

      - label: "Language"
        name: "language"
        widget: "select"
        required: false
        options:
          - { label: "English", value: "English" }
          - { label: "Spanish", value: "Spanish" }
          - { label: "Bilingual", value: "Bilingual" }

      - label: "Image"
        name: "image"
        widget: "image"
        required: false

      - label: "Featured on Home"
        name: "featured"
        widget: "boolean"
        default: false
        required: false

# endorsements
  - name: "endorsements"
    label: "Endorsements"
    label_singular: "Endorsement"
    folder: "content/endorsements"
    create: true
    slug: "{{slug}}"
    format: "json"
    extension: "json"
    summary: "{{title_en}} / {{title_es}} — {{date}}"
    fields:
      - label: "Title (English)"
        name: "title_en"
        widget: "string"

      - label: "Title (Spanish)"
        name: "title_es"
        widget: "string"

      - label: "Date"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false

      - label: "Endorser Name"
        name: "endorser"
        widget: "string"

      - label: "Type"
        name: "type"
        widget: "select"
        options:
          - { label: "Image", value: "image" }
          - { label: "Video", value: "video" }

      - label: "Image"
        name: "image"
        widget: "image"
        required: false

      - label: "Video URL"
        name: "video_url"
        widget: "string"
        required: false

      - label: "Source / Organization"
        name: "source"
        widget: "string"
        required: false

      - label: "Language"
        name: "language"
        widget: "select"
        required: false
        options:
          - { label: "English", value: "English" }
          - { label: "Spanish", value: "Spanish" }
          - { label: "Bilingual", value: "Bilingual" }

      - label: "Summary (English)"
        name: "summary_en"
        widget: "text"
        required: false

      - label: "Summary (Spanish)"
        name: "summary_es"
        widget: "text"
        required: false

      - label: "External Link"
        name: "url"
        widget: "string"
        required: false

      - label: "Featured on Home"
        name: "featured"
        widget: "boolean"
        default: false
        required: false