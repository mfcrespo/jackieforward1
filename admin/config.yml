backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

publish_mode: simple

collections:
  - name: "site_content"
    label: "Site Content"
    files:
      - label: "Events"
        name: "events"
        file: "data/events.json"
        format: "json"
        fields:
          - label: "Events"
            name: "items"
            widget: "list"
            summary: "{{fields.title}} — {{fields.date}}"
            fields:
              - label: "Title"
                name: "title"
                widget: "string"

              - label: "Event Date"
                name: "date"
                widget: "date"
                format: "YYYY-MM-DD"

              - label: "Event Time"
                name: "time"
                widget: "string"
                hint: "Example: 10:00 AM"

              - label: "Category"
                name: "category"
                widget: "select"
                options:
                  - { label: "Meet & Greet", value: "meet-greet" }
                  - { label: "Clean Up", value: "cleanup" }
                  - { label: "Canvassing", value: "canvassing" }
                  - { label: "Town Hall", value: "townhall" }
                  - { label: "Fundraiser", value: "fundraiser" }
                  - { label: "Community Event", value: "community" }

              - label: "Address"
                name: "address"
                widget: "string"

              - label: "Description"
                name: "description"
                widget: "text"

              - label: "RSVP Link"
                name: "rsvp"
                widget: "string"
                required: false

              - label: "Event Image"
                name: "image"
                widget: "image"
                required: false

              - label: "Featured Event"
                name: "featured"
                widget: "boolean"
                default: false
                required: false